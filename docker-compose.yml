version: '3.8'

services:
  # ─── Databases ───────────────────────────────────────────
  order-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_pass
      POSTGRES_DB: order_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '15432:5432'
    volumes:
      - order_data:/var/lib/postgresql/data

  payment-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_pass
      POSTGRES_DB: payment_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '15433:5432'
    volumes:
      - payment_data:/var/lib/postgresql/data

  inventory-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_pass
      POSTGRES_DB: inventory_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '15434:5432'
    volumes:
      - inventory_data:/var/lib/postgresql/data

  shipping-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shipping_user
      POSTGRES_PASSWORD: shipping_pass
      POSTGRES_DB: shipping_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '15435:5432'
    volumes:
      - shipping_data:/var/lib/postgresql/data

  notification-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: notification_pass
      POSTGRES_DB: notification_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '15436:5432'
    volumes:
      - notification_data:/var/lib/postgresql/data

  customer-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: customer_user
      POSTGRES_PASSWORD: customer_pass
      POSTGRES_DB: customer_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '15438:5432'
    volumes:
      - customer_data:/var/lib/postgresql/data

  # ─── Kafka: already running externally on localhost:9092 ──

  # ─── Temporal ────────────────────────────────────────────
  temporal-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    ports:
      - '5437:5432'
    volumes:
      - temporal_data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.24.2
    depends_on:
      - temporal-db
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
    ports:
      - '7233:7233'

  temporal-ui:
    image: temporalio/ui:2.26.2
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - '8233:8080'


  kafka:
    image: apache/kafka:3.9.0
    ports:
      - '9092:9092'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,INTERNAL://:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - '8080:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9094
    depends_on:
      - kafka
volumes:
  order_data:
  payment_data:
  inventory_data:
  shipping_data:
  notification_data:
  temporal_data:
  customer_data:
